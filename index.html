<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="content">
      
    <aside>
      <div class="aside">
        <h1>ODIN</h1>
      <img  src="odin-lined.png" alt="The odin logo">
      </div>
    </aside>
   

    <section>
      <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
      <p>You know you want to.</p>  

      <h2>Let's do this!</h2>

    <div class="form-columns">

      <div class="column" id="first">
      <label for="firstName">FIRST NAME</label>
      <input type="text" id="firstName" name="firstName">

      <label for="email">EMAIL</label>
      <input required type="email" id="email" name="email">

      <label for="password">PASSWORD</label>
      <input required type="password"  pattern=".{8,}" id="password" name="password">
    </div>


    <div class="column" id="second">
      <label for="lastName">LAST NAME</label>
      <input type="text" id="lastName" name="lastName">

      <label for="phone">PHONE NUMBER</label>
      <input type="number" id="phone" name="phone">

      <label for="confirm">CONFIRM PASSWORD</label>
      <input required type="password" pattern=".{8,}" id="confirm" name="confirm">
      </div>

      </div>
        <button type="submit">Create Account</button>
        <p>Already have an account? <span>Log in</span></p>

    </section>
  
    </div>
  </body>
</html>
